services:
  # ── Backend (Node.js / Express) ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: buyeasy-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
    networks:
      - buyeasy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React → Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buyeasy-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - buyeasy-network

  # ── RabbitMQ (message broker for async order processing) ────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: buyeasy-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - buyeasy-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis (cart caching) ─────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: buyeasy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - buyeasy-network

  # ── Node Exporter (host system metrics) ──────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: buyeasy-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - buyeasy-network

  # ── Prometheus (metrics collector) ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: buyeasy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - backend
      - node-exporter
    networks:
      - buyeasy-network

  # ── Grafana (metrics dashboard) ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: buyeasy-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - buyeasy-network

# ── Shared Network ────────────────────────────────────────────────────────
networks:
  buyeasy-network:
    driver: bridge

# ── Named Volumes ─────────────────────────────────────────────────────────
volumes:
  uploads_data:
  prometheus_data:
  grafana_data:
  rabbitmq_data: